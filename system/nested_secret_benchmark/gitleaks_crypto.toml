title = "gitleaks custom (crypto-key rule added)"
[extend]
useDefault = true
[[rules]]
id = "crypto-key-material"
description = "committed cryptographic key material (custom)"
regex = '''(?i)(aes[0-9]*|encrypt(?:ion)?|crypto|cipher|signing|hmac|master|private)[_-]?key["']?\s*[:=]\s*["']?([A-Za-z0-9+/]{32,}={0,2}|[0-9a-fA-F]{40,})'''
keywords = ["key","aes","hmac","encrypt","cipher","signing","crypto","master","private"]
