# CMKB — Control-Mapping Knowledge Base (paper-scoped release).
# ISO/IEC 27001:2022 & 27701:2025-aligned controls; secret-management / control-assurance;
# no cryptographic-algorithm or AI/ML components.
version: 0.1
name: CMKB
dimensions:
  risk:
  - low
  - med
  - high
  verifiability:
  - low
  - med
  - high
  auto_detectability:
  - low
  - med
  - high
  regulatory_scope:
  - none
  - iso27001
  - iso27701
  - both
gate_actions:
- id: merge
  strength: 0
  cost: 0.0
- id: lightweight_verify
  strength: 1
  cost: 0.2
- id: require_evidence
  strength: 2
  cost: 0.4
- id: policy_fallback
  strength: 3
  cost: 0.5
- id: full_verify
  strength: 3
  cost: 0.6
- id: human_escalate
  strength: 4
  cost: 1.0
- id: block
  strength: 5
  cost: 0.3
controls:
  A.5.15:
    std: ISO/IEC 27001:2022
    title: Access control
  A.5.16:
    std: ISO/IEC 27001:2022
    title: Identity management
  A.5.23:
    std: ISO/IEC 27001:2022
    title: Information security for use of cloud services
  A.8.2:
    std: ISO/IEC 27001:2022
    title: Privileged access rights
  A.8.8:
    std: ISO/IEC 27001:2022
    title: Management of technical vulnerabilities
  A.8.15:
    std: ISO/IEC 27001:2022
    title: Logging
  A.8.21:
    std: ISO/IEC 27001:2022
    title: Security of network services
  A.8.24:
    std: ISO/IEC 27001:2022
    title: Use of cryptography
  A.8.25:
    std: ISO/IEC 27001:2022
    title: Secure development life cycle
  A.8.28:
    std: ISO/IEC 27001:2022
    title: Secure coding
  A.8.29:
    std: ISO/IEC 27001:2022
    title: Security testing in development and acceptance
  P27701.PII:
    std: ISO/IEC 27701:2019
    title: PII processing (PIMS augmentation; clause family to confirm)
rules:
- id: R_high_cve
  cond: signals.high_cve == true
  controls:
  - A.8.8
  evidence: SCA report with CVE id, CVSS, affected version, fixed version
  gate: block
  dims:
    risk: high
    verifiability: high
    auto_detectability: high
    regulatory_scope: iso27001
- id: R_secret_in_diff
  cond: signals.secret_in_diff == true
  controls:
  - A.5.17
  - A.8.5
  evidence: secret-scan finding + key-rotation proof + git-history scrub record
  gate: block
  dims:
    risk: high
    verifiability: high
    auto_detectability: high
    regulatory_scope: iso27001
- id: R_crypto_key_committed
  cond: signals.crypto_key_in_diff == true
  controls:
  - A.8.24
  evidence: committed 對稱/簽章金鑰偵測(CK1) + 金鑰輪替證明 + 改用 Key Vault/受管金鑰 + git 歷史清除紀錄
  gate: block
  dims:
    risk: high
    verifiability: high
    auto_detectability: high
    regulatory_scope: iso27001
- id: R_identity_change
  cond: signals.identity_change == true
  controls:
  - A.5.15
  - A.5.16
  - A.8.2
  evidence: Entra OIDC federation subject + RBAC least-privilege scope diff + approver
  gate: human_escalate
  dims:
    risk: high
    verifiability: high
    auto_detectability: med
    regulatory_scope: iso27001
- id: R_db_conn_change
  cond: signals.db_conn_change == true
  controls:
  - A.8.21
  - A.5.23
  evidence: connection-integrity test (TLS/managed-identity) + auth-mode (no plaintext
    cred) verification
  gate: full_verify
  dims:
    risk: high
    verifiability: high
    auto_detectability: high
    regulatory_scope: iso27001
- id: R_identity_auth_fail
  cond: signals.identity_auth_fail == true
  controls:
  - A.5.15
  - A.5.16
  - A.8.2
  evidence: 'L3 identity oracle FAIL: secretless-OIDC / federated-subject binding
    / least-privilege RBAC'
  gate: block
  dims:
    risk: high
    verifiability: high
    auto_detectability: high
    regulatory_scope: iso27001
- id: R_db_auth_fail
  cond: signals.db_auth_fail == true
  controls:
  - A.5.17
  - A.8.5
  - A.8.24
  - A.8.21
  evidence: 'L3 DB oracle FAIL: plaintext credential / no-TLS / no managed-identity'
  gate: block
  dims:
    risk: high
    verifiability: high
    auto_detectability: high
    regulatory_scope: iso27001
- id: R_cloud_resource
  cond: signals.cloud_resource_provision == true
  controls:
  - A.5.23
  evidence: 雲端資源清單 + 年度經費估算 + biz 出資確認(承接前告知)
  gate: require_evidence
  dims:
    risk: med
    verifiability: high
    auto_detectability: high
    regulatory_scope: iso27001
- id: R_identity_data_import
  cond: signals.identity_data_import == true
  controls:
  - A.5.16
  - P27701.A.1.2.2
  - P27701.A.1.4.2
  evidence: 身份/個資匯入程序 + 處理目的與合法性(biz 當責) + 資料最小化
  gate: require_evidence
  dims:
    risk: high
    verifiability: med
    auto_detectability: med
    regulatory_scope: both
- id: R_access_logging
  cond: signals.access_logging_change == true
  controls:
  - A.8.15
  evidence: 存取/稽核紀錄設定 + 保存期 + biz 定期審視程序
  gate: require_evidence
  dims:
    risk: med
    verifiability: high
    auto_detectability: high
    regulatory_scope: iso27001
- id: R_pii_flow
  cond: signals.pii_flow == true
  controls:
  - P27701.A.1.2.2
  - P27701.A.1.2.9
  - P27701.A.1.4.3
  evidence: data-flow annotation + processing purpose record + lawful-basis tag
  gate: require_evidence
  dims:
    risk: high
    verifiability: med
    auto_detectability: low
    regulatory_scope: iso27701
- id: R_insecure_pattern
  cond: signals.sast_high == true
  controls:
  - A.8.28
  evidence: SAST high-severity finding triage + fix or justified suppression
  gate: full_verify
  dims:
    risk: high
    verifiability: high
    auto_detectability: high
    regulatory_scope: iso27001
- id: R_new_dependency
  cond: signals.new_dependency == true and signals.high_cve == false
  controls:
  - A.8.8
  evidence: SCA summary (no high CVE) + license check
  gate: lightweight_verify
  dims:
    risk: med
    verifiability: high
    auto_detectability: high
    regulatory_scope: iso27001
units:
  dev: 開發單位 — 程式碼、測試、相依套件、安全寫法
  ops: 資訊/維運單位 — 雲端建置、部署、身分平台/RBAC、DB/網路、金鑰
  biz: 需求/業務單位 — 服務承接、身份資料匯入、存取紀錄審視、版本更新需求、資料當責、年度經費編列
ownership:
  R_covert_complicity:
    R: dev
    A: dev
  R_insecure_pattern:
    R: dev
    A: dev
  R_new_dependency:
    R: dev
    A: dev
  R_high_cve:
    R: dev
    A: ops
    I: biz
  R_secret_in_diff:
    R: dev
    A: ops
    I: biz
  R_crypto_key_committed:
    R: dev
    A: ops
    I: biz
  R_identity_change:
    R: ops
    A: ops
    C: biz
    I: biz
  R_identity_auth_fail:
    R: ops
    A: ops
    C: biz
    I: biz
  R_db_conn_change:
    R: ops
    A: ops
    C: biz
    I: biz
  R_db_auth_fail:
    R: ops
    A: ops
    C: biz
    I: biz
  R_pii_flow:
    R: dev
    A: biz
    C: ops
  R_cloud_resource:
    R: ops
    A: biz
    C: biz
    I: biz
  R_identity_data_import:
    R: biz
    A: biz
    C: ops
  R_access_logging:
    R: ops
    A: biz
    I: biz
resources:
  R_identity_change: Entra ID app registration + federated credential
  R_identity_auth_fail: Entra ID app registration + federated credential
  R_db_conn_change: Azure SQL / 受管資料庫(含備援、加密)
  R_db_auth_fail: Azure SQL / 受管資料庫 + Key Vault
  R_cloud_resource: 雲端服務(App Service / Storage / 網路)
  R_access_logging: 稽核紀錄保存(Log Analytics / 儲存體,含保存期成本)
axioms:
- id: AX1_pii_min_evidence
  when: regulatory_scope in [iso27701, both]
  require_min: require_evidence
  note: PII 流程至少需 PIMS 證據
- id: AX2_hard_block
  when: rule in [R_secret_in_diff, R_high_cve, R_crypto_key_committed]
  require: block
  note: 明文密鑰/高危 CVE/committed 加密金鑰一律硬擋
- id: AX3_identity_human
  when: rule == R_identity_change
  require: human_escalate
  note: 特權/身分變更需人工裁決
